<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Background Video Site</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
}

/* 🎥 Background Video */
.bg-video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-1;
}

/* Content */
.content{
    position:relative;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:40px;
    font-family:Arial;
    text-shadow:0 0 10px black;
}
</style>

</head>

<body>

<!-- 🔥 BACKGROUND VIDEO -->
<iframe
class="bg-video"
src="YOUR_EMBED_LINK_HERE?autoplay=1&mute=1&loop=1"
frameborder="0"
allow="autoplay"
></iframe>

<!-- Content -->
<div class="content">
    Welcome
</div>

</body>
</html>
