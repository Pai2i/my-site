<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BG Video</title>

<style>
body{
    margin:0;
    overflow:hidden;
}

/* 🎥 Video Background */
video{
    position:fixed;
    right:0;
    bottom:0;
    min-width:100%;
    min-height:100%;
    object-fit:cover;
    z-index:-1;
}

/* Content */
.content{
    position:relative;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:40px;
    font-family:Arial;
}
</style>

</head>

<body>

<!-- 🔥 MP4 VIDEO -->
<video autoplay muted loop>
    <source src="YOUR_VIDEO.mp4" type="video/mp4">
</video>

<div class="content">
    Welcome
</div>

</body>
</html>
