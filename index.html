<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Background Video</title>

<style>
body{
  margin:0;
  overflow:hidden;
}

/* 🎥 FULL SCREEN VIDEO */
video{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
}

/* CONTENT */
.content{
  position:relative;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-size:40px;
  font-family:Arial;
  text-shadow:0 0 10px black;
}
</style>

</head>

<body>

<!-- 🔥 AUTO LOOP VIDEO -->
<video autoplay muted loop playsinline>
  <source src="video.mp4" type="video/mp4">
</video>

<div class="content">
  Welcome
</div>

</body>
</html>
