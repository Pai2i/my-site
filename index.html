<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Website</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: url('https://i.postimg.cc/ydLCMRHx/086c93b0c60903ea52e46fc7172c7360.jpg') no-repeat center center/cover;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .box {
      padding: 25px 35px;
      border-radius: 12px;
      border: 2px solid white;
      color: white;
      text-align: center;
      backdrop-filter: blur(5px); /* হালকা glass effect */
    }

    h1 {
      margin: 0;
      font-size: 40px;
    }

    p {
      font-size: 18px;
      margin-top: 10px;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
  </style>

</head>

<body>

  <div class="box">
    <h1>Welcome</h1>
    <p>এটা তোমার ওয়েবসাইট</p>
    <button>Click Me</button>
  </div>

</body>
</html>
