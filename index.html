<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Showcase</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f0f0f;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
}

.container{
    width:420px;
    max-width:95%;
}

.card{
    background:#181818;
    border-radius:25px;
    padding:15px;
    box-shadow:0 0 40px rgba(0,0,0,0.6);
}

.title{
    color:white;
    font-size:20px;
    margin-bottom:12px;
    text-align:center;
}

.video-wrapper{
    overflow:hidden;
    border-radius:18px;
}

iframe{
    width:100%;
    height:720px;
    border:none;
}
</style>
</head>

<body>

<div class="container">
    <div class="card">

        <div class="title">
            Featured Reel
        </div>

        <div class="video-wrapper">
            <iframe
                src="https://www.instagram.com/reel/DXyBqQ-BTPF/embed/"
                allowfullscreen>
            </iframe>
        </div>

    </div>
</div>

</body>
</html>
