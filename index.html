<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fix BG Video</title>

<style>
body{
  margin:0;
  overflow:hidden;
}

/* VIDEO BACKGROUND */
video{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
}

/* TEXT */
h1{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:white;
  font-family:Arial;
  text-shadow:0 0 10px black;
}
</style>
</head>

<body>

<video autoplay muted loop playsinline>
  <source src="./video.mp4" type="video/mp4">
</video>

<h1>Welcome</h1>

</body>
</html>
