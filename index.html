<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Website</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: url('https://i.postimg.cc/ydLCMRHx/086c93b0c60903ea52e46fc7172c7360.jpg') no-repeat center center/cover;
      font-family: Arial, sans-serif;
    }

    .overlay {
      height: 100vh;
      background: rgba(0, 0, 0, 0.5); /* dark overlay */
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
    }

    h1 {
      font-size: 40px;
      margin: 0;
    }

    p {
      font-size: 18px;
    }

    .box {
      padding: 20px;
      border: 2px solid white;
      border-radius: 10px;
    }
  </style>

</head>

<body>

  <div class="overlay">
    <div class="box">
      <h1>Welcome to My Website</h1>
      <p>এটা একটা simple background website</p>
    </div>
  </div>

</body>
</html>
